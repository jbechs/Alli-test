<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTC Synced Audio Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      display: grid;
      gap: 12px;
      width: min(90vw, 420px);
    }

    input, button {
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: white;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    .status {
      min-height: 2em;
      color: #ccc;
    }

    audio {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>UTC Synced Audio Player</h1>

    <label for="startTime">Start Time (UTC)</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="playButton" type="button">Play</button>

    <div id="status" class="status">Page loaded.</div>

    <audio id="audio" controls preload="metadata">
      <source src="track.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const startTimeInput = document.getElementById("startTime");
    const status = document.getElementById("status");

    playButton.addEventListener("click", async () => {
      const inputValue = startTimeInput.value;

      if (!inputValue) {
        status.textContent = "Please enter a UTC start time.";
        return;
      }

      const startTimestampMs = new Date(inputValue + "Z").getTime();

      if (Number.isNaN(startTimestampMs)) {
        status.textContent = "Invalid UTC time.";
        return;
      }

      const now = Date.now();
      const offsetSeconds = Math.max(0, (now - startTimestampMs) / 1000);

      status.textContent = `Trying playback at ${offsetSeconds.toFixed(1)} seconds...`;

      const go = async () => {
        try {
          audio.currentTime = offsetSeconds;
          await audio.play();
          status.textContent = `Playing from ${audio.currentTime.toFixed(1)} seconds.`;
        } catch (err) {
          console.error("Playback failed:", err);
          status.textContent = "Playback failed. Check browser console.";
        }
      };

      if (audio.readyState >= 1) {
        go();
      } else {
        audio.addEventListener("loadedmetadata", go, { once: true });
        audio.load();
      }
    });

    audio.addEventListener("loadedmetadata", () => {
      status.textContent = `Audio loaded. Duration: ${audio.duration.toFixed(1)} seconds.`;
    });

    audio.addEventListener("error", () => {
      console.error("Audio error:", audio.error);
      status.textContent = "Audio failed to load. Check file path and filename.";
    });
  </script>
</body>
</html>
