<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alli Test - Simple Synced Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(90vw, 420px);
      text-align: center;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    label {
      font-size: 0.95rem;
    }

    input,
    button {
      font-size: 1rem;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: #fff;
    }

    button {
      background: #fff;
      color: #111;
      cursor: pointer;
      font-weight: bold;
    }

    .status {
      min-height: 2.5em;
      color: #ccc;
      white-space: pre-line;
      font-size: 0.95rem;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>UTC Synced Audio Player</h1>

    <label for="startTime">Start Time (UTC)</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="playButton">Play</button>

    <div id="status" class="status">Loading audio...</div>

    <audio id="audio" preload="auto" playsinline>
      <source src="audio/track.mp3" type="audio/mpeg" />
      Your browser does not support audio playback.
    </audio>
  </main>

  <script>
    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const startTimeInput = document.getElementById("startTime");
    const statusEl = document.getElementById("status");

    let countdownTimer = null;
    let startTimestampMs = null;
    let audioReady = false;

    console.log("AUTO-LOAD PLAYER LOADED");

    // Start loading immediately when page opens
    window.addEventListener("load", () => {
      setStatus("Loading audio...");
      audio.load();
      monitorInitialLoad();
    });

    playButton.addEventListener("click", async () => {
      clearExistingTimers();

      const inputValue = startTimeInput.value;
      if (!inputValue) {
        setStatus("Please enter a UTC start time.");
        return;
      }

      startTimestampMs = parseUtcInput(inputValue);

      if (Number.isNaN(startTimestampMs)) {
        setStatus("Invalid time format.");
        return;
      }

      try {
        // unlock audio for browsers that want a user gesture
        await audio.play();
        audio.pause();
      } catch (err) {
        console.log("Initial unlock attempt:", err);
      }

      // If not ready yet, wait quietly here instead of failing
      if (!audioReady) {
        setStatus("Finishing audio load...");
        try {
          await waitForPlayable(audio, 20000);
          audioReady = true;
        } catch (err) {
          console.error("Playable wait failed:", err);
          setStatus(`Audio load failed: ${err.message}`);
          return;
        }
      }

      const offsetSeconds = (Date.now() - startTimestampMs) / 1000;

      if (offsetSeconds < 0) {
        waitUntilStart();
      } else {
        beginPlayback(offsetSeconds);
      }
    });

    function parseUtcInput(value) {
      return new Date(value + "Z").getTime();
    }

    function waitUntilStart() {
      const tick = () => {
        const msRemaining = startTimestampMs - Date.now();

        if (msRemaining <= 0) {
          beginPlayback(0);
          return;
        }

        const totalSeconds = Math.ceil(msRemaining / 1000);
        setStatus(`Starting in ${totalSeconds} second${totalSeconds === 1 ? "" : "s"}...`);
        countdownTimer = setTimeout(tick, 250);
      };

      tick();
    }

    async function beginPlayback(initialOffsetSeconds) {
      try {
        const offset = Math.max(0, initialOffsetSeconds);

        if (!Number.isNaN(audio.duration) && offset >= audio.duration) {
          setStatus("The track has already finished.");
          return;
        }

        // Make sure enough data is available before seeking/playing
        if (audio.readyState < 2) {
          setStatus("Preparing playback...");
          await waitForPlayable(audio, 15000);
        }

        audio.pause();
        audio.currentTime = offset;

        await waitForSeekIfNeeded(audio, 3000);

        // brief settle time after seek
        await delay(120);

        await audio.play();
        setStatus(`Playing from ${formatTime(audio.currentTime)}.`);
      } catch (err) {
        console.error("Playback failed:", err);
        setStatus(`Playback failed: ${err.message}`);
      }
    }

    function monitorInitialLoad() {
      if (audio.readyState >= 2) {
        audioReady = true;
        setStatus(`Audio ready. Duration: ${formatTime(audio.duration || 0)}.`);
        return;
      }

      const onReady = () => {
        audioReady = true;
        cleanup();
        setStatus(`Audio ready. Duration: ${formatTime(audio.duration || 0)}.`);
      };

      const onError = () => {
        cleanup();
        setStatus(`Audio error: ${describeMediaError(audio)}`);
      };

      function cleanup() {
        audio.removeEventListener("loadeddata", onReady);
        audio.removeEventListener("canplay", onReady);
        audio.removeEventListener("canplaythrough", onReady);
        audio.removeEventListener("error", onError);
      }

      audio.addEventListener("loadeddata", onReady, { once: true });
      audio.addEventListener("canplay", onReady, { once: true });
      audio.addEventListener("canplaythrough", onReady, { once: true });
      audio.addEventListener("error", onError, { once: true });
    }

    function waitForPlayable(el, timeoutMs = 15000) {
      return new Promise((resolve, reject) => {
        if (el.readyState >= 2) {
          resolve();
          return;
        }

        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          cleanup();
          resolve();
        };

        const fail = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error("buffering timeout"));
        };

        const onError = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error(describeMediaError(el)));
        };

        const cleanup = () => {
          clearTimeout(timer);
          el.removeEventListener("loadeddata", finish);
          el.removeEventListener("canplay", finish);
          el.removeEventListener("canplaythrough", finish);
          el.removeEventListener("error", onError);
        };

        const timer = setTimeout(fail, timeoutMs);

        el.addEventListener("loadeddata", finish, { once: true });
        el.addEventListener("canplay", finish, { once: true });
        el.addEventListener("canplaythrough", finish, { once: true });
        el.addEventListener("error", onError, { once: true });
      });
    }

    function waitForSeekIfNeeded(el, timeoutMs = 3000) {
      return new Promise((resolve) => {
        if (!el.seeking) {
          resolve();
          return;
        }

        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          el.removeEventListener("seeked", finish);
          resolve();
        };

        const timer = setTimeout(finish, timeoutMs);
        el.addEventListener("seeked", finish, { once: true });
      });
    }

    function describeMediaError(el) {
      const code = el.error ? el.error.code : null;
      if (code === 1) return "audio aborted";
      if (code === 2) return "network error";
      if (code === 3) return "decode error";
      if (code === 4) return "source not supported";
      return "audio error";
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function clearExistingTimers() {
      if (countdownTimer) {
        clearTimeout(countdownTimer);
        countdownTimer = null;
      }
    }

    function setStatus(message) {
      console.log("STATUS:", message);
      statusEl.textContent = message;
    }

    function formatTime(seconds) {
      const s = Math.max(0, Math.floor(seconds));
      const hrs = Math.floor(s / 3600);
      const mins = Math.floor((s % 3600) / 60);
      const secs = s % 60;

      if (hrs > 0) {
        return `${hrs}:${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    audio.addEventListener("loadedmetadata", () => {
      console.log("EVENT: loadedmetadata", audio.duration);
    });

    audio.addEventListener("loadeddata", () => {
      console.log("EVENT: loadeddata");
    });

    audio.addEventListener("canplay", () => {
      console.log("EVENT: canplay");
    });

    audio.addEventListener("canplaythrough", () => {
      console.log("EVENT: canplaythrough");
    });

    audio.addEventListener("stalled", () => {
      console.log("EVENT: stalled");
    });

    audio.addEventListener("waiting", () => {
      console.log("EVENT: waiting");
    });

    audio.addEventListener("ended", () => {
      setStatus("Playback ended.");
    });

    audio.addEventListener("error", () => {
      console.log("AUDIO ERROR OBJECT:", audio.error);
      console.log("AUDIO currentSrc:", audio.currentSrc);
      console.log("AUDIO readyState:", audio.readyState);
      console.log("AUDIO networkState:", audio.networkState);
      setStatus(`Audio error: ${describeMediaError(audio)}`);
    });
  </script>
</body>
</html>
