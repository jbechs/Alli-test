<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }
    .container {
      text-align: center;
      display: grid;
      gap: 12px;
      width: min(90vw, 420px);
    }
    button, input {
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }
    .status {
      min-height: 2em;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Audio Test</h1>
    <button id="playButton" type="button">Play Audio</button>
    <div id="status" class="status">Page loaded.</div>

    <audio id="audio" controls preload="metadata">
      <source src="track.mp3" type="audio/mpeg" />
    </audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const button = document.getElementById("playButton");
    const status = document.getElementById("status");

    audio.addEventListener("loadedmetadata", () => {
      status.textContent = "Audio metadata loaded.";
    });

    audio.addEventListener("canplay", () => {
      status.textContent = "Audio can play.";
    });

    audio.addEventListener("error", () => {
      console.error("Audio element error:", audio.error);
      status.textContent = "Audio error. File path or file format problem.";
    });

    button.addEventListener("click", async () => {
      status.textContent = "Button clicked. Trying play...";
      try {
        await audio.play();
        status.textContent = "Playback started.";
      } catch (err) {
        console.error("Play failed:", err);
        status.textContent = "Playback failed. See browser console.";
      }
    });
  </script>
</body>
</html>
