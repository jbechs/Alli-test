<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alli Test - Minimal Synced Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(90vw, 420px);
      text-align: center;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    label {
      font-size: 0.95rem;
    }

    input,
    button {
      font-size: 1rem;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: #fff;
    }

    button {
      background: #fff;
      color: #111;
      cursor: pointer;
      font-weight: bold;
    }

    .status {
      min-height: 2.5em;
      color: #ccc;
      white-space: pre-line;
      font-size: 0.95rem;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>UTC Synced Audio Player</h1>

    <label for="startTime">Start Time (UTC)</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="playButton">Play</button>

    <div id="status" class="status">Ready.</div>

    <audio id="audio" preload="auto" playsinline src="audio/track.mp3"></audio>
  </main>

  <script>
    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const startTimeInput = document.getElementById("startTime");
    const statusEl = document.getElementById("status");

    let countdownTimer = null;
    let startTimestampMs = null;

    console.log("MINIMAL PLAYER LOADED");
    console.log("audio src:", audio.src);

    playButton.addEventListener("click", async () => {
      clearExistingTimers();

      const inputValue = startTimeInput.value;
      if (!inputValue) {
        setStatus("Please enter a UTC start time.");
        return;
      }

      startTimestampMs = parseUtcInput(inputValue);

      if (Number.isNaN(startTimestampMs)) {
        setStatus("Invalid time format.");
        return;
      }

      const offsetSeconds = (Date.now() - startTimestampMs) / 1000;

      if (offsetSeconds < 0) {
        waitUntilStart();
      } else {
        startAtOffset(offsetSeconds);
      }
    });

    function parseUtcInput(value) {
      return new Date(value + "Z").getTime();
    }

    function waitUntilStart() {
      const tick = () => {
        const msRemaining = startTimestampMs - Date.now();

        if (msRemaining <= 0) {
          startAtOffset(0);
          return;
        }

        const totalSeconds = Math.ceil(msRemaining / 1000);
        setStatus(`Starting in ${totalSeconds} second${totalSeconds === 1 ? "" : "s"}...`);
        countdownTimer = setTimeout(tick, 250);
      };

      tick();
    }

    async function startAtOffset(offsetSeconds) {
      try {
        const offset = Math.max(0, offsetSeconds);

        // Wake audio in browsers that want a gesture.
        try {
          await audio.play();
          audio.pause();
        } catch (err) {
          console.log("unlock attempt:", err);
        }

        if (audio.readyState >= 1) {
          await seekAndPlay(offset);
        } else {
          setStatus("Waiting for audio metadata...");
          await waitForMetadata(audio, 15000);
          await seekAndPlay(offset);
        }
      } catch (err) {
        console.error("Playback failed:", err);
        setStatus(`Playback failed: ${err.message}`);
      }
    }

    async function seekAndPlay(offset) {
      if (!Number.isNaN(audio.duration) && offset >= audio.duration) {
        setStatus("The track has already finished.");
        return;
      }

      audio.pause();
      audio.currentTime = offset;

      await waitForSeekIfNeeded(audio, 2500);
      await audio.play();

      setStatus(`Playing from ${formatTime(audio.currentTime)}.`);
    }

    function waitForMetadata(el, timeoutMs = 15000) {
      return new Promise((resolve, reject) => {
        if (el.readyState >= 1) {
          resolve();
          return;
        }

        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          cleanup();
          resolve();
        };

        const fail = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error("metadata timeout"));
        };

        const onError = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error(describeMediaError(el)));
        };

        const cleanup = () => {
          clearTimeout(timer);
          el.removeEventListener("loadedmetadata", finish);
          el.removeEventListener("error", onError);
        };

        const timer = setTimeout(fail, timeoutMs);

        el.addEventListener("loadedmetadata", finish, { once: true });
        el.addEventListener("error", onError, { once: true });
      });
    }

    function waitForSeekIfNeeded(el, timeoutMs = 2500) {
      return new Promise((resolve) => {
        if (!el.seeking) {
          resolve();
          return;
        }

        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          el.removeEventListener("seeked", finish);
          resolve();
        };

        const timer = setTimeout(finish, timeoutMs);
        el.addEventListener("seeked", finish, { once: true });
      });
    }

    function describeMediaError(el) {
      const code = el.error ? el.error.code : null;
      if (code === 1) return "audio aborted";
      if (code === 2) return "network error";
      if (code === 3) return "decode error";
      if (code === 4) return "source not supported";
      return "audio error";
    }

    function clearExistingTimers() {
      if (countdownTimer) {
        clearTimeout(countdownTimer);
        countdownTimer = null;
      }
    }

    function setStatus(message) {
      console.log("STATUS:", message);
      statusEl.textContent = message;
    }

    function formatTime(seconds) {
      const s = Math.max(0, Math.floor(seconds));
      const hrs = Math.floor(s / 3600);
      const mins = Math.floor((s % 3600) / 60);
      const secs = s % 60;

      if (hrs > 0) {
        return `${hrs}:${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    audio.addEventListener("loadedmetadata", () => {
      console.log("EVENT: loadedmetadata", audio.duration);
    });

    audio.addEventListener("loadeddata", () => {
      console.log("EVENT: loadeddata");
    });

    audio.addEventListener("canplay", () => {
      console.log("EVENT: canplay");
    });

    audio.addEventListener("seeking", () => {
      console.log("EVENT: seeking");
    });

    audio.addEventListener("seeked", () => {
      console.log("EVENT: seeked");
    });

    audio.addEventListener("waiting", () => {
      console.log("EVENT: waiting");
    });

    audio.addEventListener("ended", () => {
      setStatus("Playback ended.");
    });

    audio.addEventListener("error", () => {
      console.log("AUDIO ERROR OBJECT:", audio.error);
      console.log("AUDIO currentSrc:", audio.currentSrc);
      console.log("AUDIO readyState:", audio.readyState);
      console.log("AUDIO networkState:", audio.networkState);
      setStatus(`Audio error: ${describeMediaError(audio)}`);
    });
  </script>
</body>
</html>
