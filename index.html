<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alli Test - Sanity Check</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(90vw, 420px);
      text-align: center;
      display: grid;
      gap: 14px;
    }

    input, button {
      font-size: 1rem;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: #fff;
    }

    button {
      background: #fff;
      color: #111;
      cursor: pointer;
      font-weight: bold;
    }

    .status {
      min-height: 2.5em;
      color: #ccc;
      white-space: pre-line;
    }

    audio {
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>UTC Synced Audio Player</h1>

    <label for="startTime">Start Time (UTC)</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="playButton">Play</button>

    <div id="status" class="status">Ready.</div>

    <audio id="audio" controls preload="metadata" playsinline src="audio/track.mp3"></audio>
  </main>

  <script>
    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const startTimeInput = document.getElementById("startTime");
    const statusEl = document.getElementById("status");

    let countdownTimer = null;
    let startTimestampMs = null;

    playButton.addEventListener("click", async () => {
      clearExistingTimers();

      const inputValue = startTimeInput.value;
      if (!inputValue) {
        setStatus("Please enter a UTC start time.");
        return;
      }

      startTimestampMs = new Date(inputValue + "Z").getTime();

      if (Number.isNaN(startTimestampMs)) {
        setStatus("Invalid time format.");
        return;
      }

      const offsetSeconds = (Date.now() - startTimestampMs) / 1000;

      if (offsetSeconds < 0) {
        waitUntilStart();
      } else {
        startAtOffset(offsetSeconds);
      }
    });

    function waitUntilStart() {
      const tick = () => {
        const msRemaining = startTimestampMs - Date.now();

        if (msRemaining <= 0) {
          startAtOffset(0);
          return;
        }

        const totalSeconds = Math.ceil(msRemaining / 1000);
        setStatus(`Starting in ${totalSeconds} second${totalSeconds === 1 ? "" : "s"}...`);
        countdownTimer = setTimeout(tick, 250);
      };

      tick();
    }

    async function startAtOffset(offsetSeconds) {
      try {
        const offset = Math.max(0, offsetSeconds);

        try {
          await audio.play();
          audio.pause();
        } catch (err) {
          console.log("unlock attempt:", err);
        }

        if (isFinite(audio.duration) && offset >= audio.duration) {
          setStatus("The track has already finished.");
          return;
        }

        audio.currentTime = offset;
        await audio.play();
        setStatus(`Playing from ${formatTime(audio.currentTime)}.`);
      } catch (err) {
        console.error(err);
        setStatus(`Playback failed: ${err.message}`);
      }
    }

    function clearExistingTimers() {
      if (countdownTimer) {
        clearTimeout(countdownTimer);
        countdownTimer = null;
      }
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function formatTime(seconds) {
      const s = Math.max(0, Math.floor(seconds));
      const mins = Math.floor(s / 60);
      const secs = s % 60;
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    audio.addEventListener("error", () => {
      const code = audio.error ? audio.error.code : null;
      let message = "audio error";
      if (code === 1) message = "audio aborted";
      if (code === 2) message = "network error";
      if (code === 3) message = "decode error";
      if (code === 4) message = "source not supported";
      setStatus(`Audio error: ${message}`);
      console.log("audio src:", audio.src);
      console.log("audio currentSrc:", audio.currentSrc);
      console.log("audio error:", audio.error);
    });
  </script>
</body>
</html>
