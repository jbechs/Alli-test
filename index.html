<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alli Test - Direct Audio Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(90vw, 420px);
      text-align: center;
      display: grid;
      gap: 14px;
    }

    input,
    button {
      font-size: 1rem;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: #fff;
    }

    button {
      background: #fff;
      color: #111;
      cursor: pointer;
      font-weight: bold;
    }

    .status {
      min-height: 2.5em;
      color: #ccc;
      white-space: pre-line;
    }

    audio {
      width: 100%;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>UTC Synced Audio Player</h1>

    <label for="startTime">Start Time (UTC)</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="loadButton">Load Audio</button>
    <button id="playButton">Play</button>

    <div id="status" class="status">Not loaded.</div>

    <audio id="audio" playsinline preload="metadata" controls></audio>
  </main>

  <script>
    const loadButton = document.getElementById("loadButton");
    const playButton = document.getElementById("playButton");
    const startTimeInput = document.getElementById("startTime");
    const statusEl = document.getElementById("status");
    const audio = document.getElementById("audio");

    // IMPORTANT: absolute path for GitHub Pages project site
    const AUDIO_URL = "/Alli-test/audio/track.mp3";

    let fileLoaded = false;
    let countdownTimer = null;
    let startTimestampMs = null;

    console.log("DIRECT AUDIO TEST LOADED");
    console.log("AUDIO_URL:", AUDIO_URL);

    loadButton.addEventListener("click", async () => {
      try {
        fileLoaded = false;

        const mp3Support = audio.canPlayType("audio/mpeg");
        console.log("canPlayType(audio/mpeg):", mp3Support);

        setStatus(
          "Loading audio directly...\n" +
          `MP3 support check: ${mp3Support || "empty string"}`
        );

        audio.innerHTML = "";
        const source = document.createElement("source");
        source.src = AUDIO_URL;
        source.type = "audio/mpeg";
        audio.appendChild(source);

        audio.load();

        await waitForReady(audio, 8000);

        fileLoaded = true;
        setStatus(
          `Audio loaded.\nDuration: ${formatTime(audio.duration || 0)}\n` +
          `Current src: ${audio.currentSrc || AUDIO_URL}`
        );
      } catch (err) {
        console.error("Load failed:", err);
        setStatus(`Load failed: ${err.message}`);
      }
    });

    playButton.addEventListener("click", async () => {
      clearExistingTimers();

      if (!fileLoaded) {
        setStatus("Load audio first.");
        return;
      }

      const inputValue = startTimeInput.value;
      if (!inputValue) {
        setStatus("Please enter a UTC start time.");
        return;
      }

      startTimestampMs = parseUtcInput(inputValue);

      if (Number.isNaN(startTimestampMs)) {
        setStatus("Invalid time format.");
        return;
      }

      try {
        await audio.play();
        audio.pause();
      } catch (err) {
        console.error(err);
        setStatus("Audio could not be initialized. Try again.");
        return;
      }

      const offsetSeconds = (Date.now() - startTimestampMs) / 1000;

      if (offsetSeconds < 0) {
        waitUntilStart();
      } else {
        beginPlayback(offsetSeconds);
      }
    });

    function parseUtcInput(value) {
      return new Date(value + "Z").getTime();
    }

    function waitUntilStart() {
      const tick = () => {
        const msRemaining = startTimestampMs - Date.now();

        if (msRemaining <= 0) {
          beginPlayback(0);
          return;
        }

        const totalSeconds = Math.ceil(msRemaining / 1000);
        setStatus(`Starting in ${totalSeconds} second${totalSeconds === 1 ? "" : "s"}...`);
        countdownTimer = setTimeout(tick, 250);
      };

      tick();
    }

    async function beginPlayback(initialOffsetSeconds) {
      try {
        const offset = Math.max(0, initialOffsetSeconds);

        if (!Number.isNaN(audio.duration) && offset >= audio.duration) {
          setStatus("The track has already finished.");
          return;
        }

        audio.pause();
        audio.currentTime = offset;

        await waitForSeekIfNeeded(audio, 1500);

        await audio.play();
        setStatus(`Playing from ${formatTime(audio.currentTime)}.`);
      } catch (err) {
        console.error(err);
        setStatus(`Playback failed: ${err.message}`);
      }
    }

    function waitForReady(el, timeoutMs = 8000) {
      return new Promise((resolve, reject) => {
        if (el.readyState >= 1) {
          resolve();
          return;
        }

        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          cleanup();
          resolve();
        };

        const fail = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error("audio readiness timeout"));
        };

        const cleanup = () => {
          clearTimeout(timer);
          el.removeEventListener("loadedmetadata", finish);
          el.removeEventListener("loadeddata", finish);
          el.removeEventListener("canplay", finish);
          el.removeEventListener("error", onError);
        };

        const onError = () => {
          if (done) return;
          done = true;
          cleanup();

          let code = el.error ? el.error.code : null;
          let message = "audio element error";

          if (code === 1) message = "audio aborted";
          if (code === 2) message = "network error";
          if (code === 3) message = "decode error";
          if (code === 4) message = "source not supported";

          reject(new Error(message));
        };

        const timer = setTimeout(fail, timeoutMs);

        el.addEventListener("loadedmetadata", finish, { once: true });
        el.addEventListener("loadeddata", finish, { once: true });
        el.addEventListener("canplay", finish, { once: true });
        el.addEventListener("error", onError, { once: true });
      });
    }

    function waitForSeekIfNeeded(el, timeoutMs = 1500) {
      return new Promise((resolve) => {
        if (!el.seeking) {
          resolve();
          return;
        }

        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          el.removeEventListener("seeked", finish);
          resolve();
        };

        const timer = setTimeout(finish, timeoutMs);
        el.addEventListener("seeked", finish, { once: true });
      });
    }

    function clearExistingTimers() {
      if (countdownTimer) {
        clearTimeout(countdownTimer);
        countdownTimer = null;
      }
    }

    function setStatus(message) {
      console.log("STATUS:", message);
      statusEl.textContent = message;
    }

    function formatTime(seconds) {
      const s = Math.max(0, Math.floor(seconds));
      const hrs = Math.floor(s / 3600);
      const mins = Math.floor((s % 3600) / 60);
      const secs = s % 60;

      if (hrs > 0) {
        return `${hrs}:${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    audio.addEventListener("loadedmetadata", () => {
      console.log("EVENT: loadedmetadata", audio.duration);
    });

    audio.addEventListener("loadeddata", () => {
      console.log("EVENT: loadeddata");
    });

    audio.addEventListener("canplay", () => {
      console.log("EVENT: canplay");
    });

    audio.addEventListener("canplaythrough", () => {
      console.log("EVENT: canplaythrough");
    });

    audio.addEventListener("waiting", () => {
      setStatus("Playback is waiting for data...");
    });

    audio.addEventListener("stalled", () => {
      setStatus("Playback stalled.");
    });

    audio.addEventListener("ended", () => {
      setStatus("Playback ended.");
    });

    audio.addEventListener("error", () => {
      console.log("AUDIO ERROR OBJECT:", audio.error);
      console.log("AUDIO currentSrc:", audio.currentSrc);
      console.log("AUDIO networkState:", audio.networkState);
      console.log("AUDIO readyState:", audio.readyState);

      if (audio.error) {
        console.log("AUDIO ERROR CODE:", audio.error.code);
      }
    });
  </script>
</body>
</html>
