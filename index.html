<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synced Audio Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(90vw, 480px);
      display: grid;
      gap: 16px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    label {
      font-size: 0.95rem;
    }

    input,
    button {
      font-size: 1rem;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: #fff;
    }

    button {
      background: #fff;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    audio {
      width: 100%;
    }

    .status {
      min-height: 1.5em;
      color: #ccc;
    }

    .countdown {
      min-height: 1.5em;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Synced Audio Player</h1>

    <label for="startTime">Start Time (local time)</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="playButton">Play</button>

    <div id="countdown" class="countdown"></div>
    <div id="status" class="status">Ready.</div>

    <audio
      id="audio"
      controls
      preload="metadata"
      playsinline
      src="track.mp3"
    ></audio>
  </main>

  <script>
    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const startInput = document.getElementById("startTime");
    const statusEl = document.getElementById("status");
    const countdownEl = document.getElementById("countdown");

    let countdownInterval = null;
    let countdownTimeout = null;
    let primedForFutureStart = false;
    let targetStartMs = null;

    function setStatus(msg) {
      console.log(msg);
      statusEl.textContent = msg;
    }

    function setCountdown(msg) {
      countdownEl.textContent = msg;
    }

    function clearTimers() {
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      if (countdownTimeout) {
        clearTimeout(countdownTimeout);
        countdownTimeout = null;
      }
    }

    function formatTrackTime(sec) {
      sec = Math.floor(Math.max(0, sec));
      const mins = Math.floor(sec / 60);
      const secs = sec % 60;
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    function formatCountdown(msRemaining) {
      const totalSeconds = Math.ceil(msRemaining / 1000);
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function describeMediaError(el) {
      const code = el.error ? el.error.code : null;
      if (code === 1) return "audio aborted";
      if (code === 2) return "network error";
      if (code === 3) return "decode error";
      if (code === 4) return "source not supported";
      return "audio error";
    }

    async function ensureMetadata(timeoutMs = 10000) {
      if (audio.readyState >= 1) return;

      await new Promise((resolve, reject) => {
        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          cleanup();
          resolve();
        };

        const fail = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error("metadata timeout"));
        };

        const onError = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error(describeMediaError(audio)));
        };

        function cleanup() {
          clearTimeout(timer);
          audio.removeEventListener("loadedmetadata", finish);
          audio.removeEventListener("error", onError);
        }

        const timer = setTimeout(fail, timeoutMs);
        audio.addEventListener("loadedmetadata", finish, { once: true });
        audio.addEventListener("error", onError, { once: true });

        // Explicit nudge in case browser hasn't started fetching yet
        audio.load();
      });
    }

    function waitForSeekIfNeeded(timeoutMs = 2000) {
      return new Promise((resolve) => {
        if (!audio.seeking) {
          resolve();
          return;
        }

        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          cleanup();
          resolve();
        };

        function cleanup() {
          clearTimeout(timer);
          audio.removeEventListener("seeked", finish);
        }

        const timer = setTimeout(finish, timeoutMs);
        audio.addEventListener("seeked", finish, { once: true });
      });
    }

    async function primeForFutureStart() {
      primedForFutureStart = false;

      await ensureMetadata();

      audio.pause();
      audio.currentTime = 0;
      audio.muted = true;
      audio.volume = 1;

      // This is the key iOS/Android-friendly move:
      // begin playback during the user gesture, but muted.
      await audio.play();
      primedForFutureStart = true;
      setStatus("Armed for countdown.");
    }

    async function playAtOffset(offsetSeconds) {
      await ensureMetadata();

      if (isFinite(audio.duration) && offsetSeconds >= audio.duration) {
        setStatus("Track already finished.");
        setCountdown("");
        primedForFutureStart = false;
        return;
      }

      audio.pause();
      audio.currentTime = Math.max(0, offsetSeconds);
      await waitForSeekIfNeeded();

      if (primedForFutureStart) {
        // Resume from the already-primed element
        audio.muted = false;
        setStatus(`Playing from ${formatTrackTime(audio.currentTime)}.`);
        setCountdown("");
        primedForFutureStart = false;
        return;
      }

      await audio.play();
      setStatus(`Playing from ${formatTrackTime(audio.currentTime)}.`);
      setCountdown("");
    }

    function beginCountdown(startTimeMs) {
      clearTimers();
      targetStartMs = startTimeMs;

      function updateCountdown() {
        const remaining = targetStartMs - Date.now();

        if (remaining <= 0) {
          clearTimers();
          setCountdown("Starting now...");
          playAtOffset(0).catch((err) => {
            console.error(err);
            setStatus(`Playback failed: ${err.message}`);
          });
          return;
        }

        setCountdown(`Starting in ${formatCountdown(remaining)}`);
        setStatus("Waiting to begin...");
      }

      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 250);

      countdownTimeout = setTimeout(() => {
        clearTimers();
        setCountdown("Starting now...");
        playAtOffset(0).catch((err) => {
          console.error(err);
          setStatus(`Playback failed: ${err.message}`);
        });
      }, Math.max(0, startTimeMs - Date.now()));
    }

    playButton.addEventListener("click", async () => {
      clearTimers();
      primedForFutureStart = false;

      if (!startInput.value) {
        setStatus("Enter a start time.");
        setCountdown("");
        return;
      }

      // datetime-local is LOCAL time, not UTC.
      const startTimeMs = new Date(startInput.value).getTime();

      if (Number.isNaN(startTimeMs)) {
        setStatus("Invalid time.");
        setCountdown("");
        return;
      }

      const offsetSeconds = (Date.now() - startTimeMs) / 1000;

      try {
        if (offsetSeconds < 0) {
          await primeForFutureStart();
          beginCountdown(startTimeMs);
        } else {
          setCountdown("");
          await playAtOffset(offsetSeconds);
        }
      } catch (err) {
        console.error(err);
        setStatus(`Playback failed: ${err.message}`);
        setCountdown("");
        primedForFutureStart = false;
      }
    });

    audio.addEventListener("ended", () => {
      setStatus("Playback ended.");
      setCountdown("");
      primedForFutureStart = false;
    });

    audio.addEventListener("error", () => {
      const message = describeMediaError(audio);
      setStatus(`Audio error: ${message}`);
      setCountdown("");
      primedForFutureStart = false;
      console.log("audio.src:", audio.src);
      console.log("audio.currentSrc:", audio.currentSrc);
      console.log("audio.error:", audio.error);
    });

    audio.addEventListener("loadedmetadata", () => {
      console.log("loadedmetadata", audio.duration);
    });

    audio.addEventListener("canplay", () => {
      console.log("canplay");
    });
  </script>
</body>
</html>
