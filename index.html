<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTC Audio Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      display: grid;
      gap: 12px;
      width: min(90vw, 460px);
    }

    button, input {
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: white;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    .status {
      min-height: 2em;
      color: #ccc;
      line-height: 1.4;
    }

    .debug {
      font-size: 13px;
      color: #999;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    audio {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>UTC Audio Test</h1>

    <label for="startTime">Start Time (UTC)</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="playButton" type="button">Play From UTC Time</button>
    <button id="startButton" type="button">Play From Start</button>

    <div id="status" class="status">Page loaded.</div>
    <div id="debug" class="debug"></div>

    <audio id="audio" controls preload="metadata">
      <source src="track.mp3" type="audio/mpeg" />
    </audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const startButton = document.getElementById("startButton");
    const startTimeInput = document.getElementById("startTime");
    const status = document.getElementById("status");
    const debug = document.getElementById("debug");

    function fmt(seconds) {
      if (!isFinite(seconds)) return "unknown";
      const s = Math.floor(seconds);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${String(sec).padStart(2, "0")}`;
    }

    function updateDebug(extra = "") {
      debug.textContent =
        `Current audio time: ${audio.currentTime.toFixed(1)}s (${fmt(audio.currentTime)})\n` +
        `Track duration: ${isFinite(audio.duration) ? audio.duration.toFixed(1) : "unknown"}s (${fmt(audio.duration)})\n` +
        extra;
    }

    audio.addEventListener("loadedmetadata", () => {
      status.textContent = `Audio loaded. Duration: ${fmt(audio.duration)}.`;
      updateDebug();
    });

    audio.addEventListener("canplay", () => {
      status.textContent = "Player can play.";
      updateDebug();
    });

    audio.addEventListener("error", () => {
      console.error("Audio element error:", audio.error);
      status.textContent = "Audio error. File path or file format problem.";
      updateDebug();
    });

    audio.addEventListener("ended", () => {
      status.textContent = "Playback ended.";
      updateDebug();
    });

    startButton.addEventListener("click", async () => {
      try {
        audio.currentTime = 0;
        await audio.play();
        status.textContent = "Playing from start.";
        updateDebug();
      } catch (err) {
        console.error(err);
        status.textContent = "Play from start failed.";
        updateDebug(String(err));
      }
    });

    playButton.addEventListener("click", async () => {
      const inputValue = startTimeInput.value;

      if (!inputValue) {
        status.textContent = "Please enter a UTC start time.";
        updateDebug();
        return;
      }

      const startTimestampMs = new Date(inputValue + "Z").getTime();
      const nowMs = Date.now();
      const offsetSeconds = (nowMs - startTimestampMs) / 1000;

      if (Number.isNaN(startTimestampMs)) {
        status.textContent = "Invalid UTC time.";
        updateDebug();
        return;
      }

      updateDebug(
        `Now (UTC): ${new Date(nowMs).toISOString()}\n` +
        `Entered start (treated as UTC): ${new Date(startTimestampMs).toISOString()}\n` +
        `Calculated offset: ${offsetSeconds.toFixed(1)}s (${fmt(offsetSeconds)})`
      );

      if (!isFinite(audio.duration)) {
        status.textContent = "Audio duration not ready yet. Try again in a moment.";
        return;
      }

      if (offsetSeconds < 0) {
        status.textContent = "That UTC start time is in the future.";
        return;
      }

      if (offsetSeconds >= audio.duration) {
        status.textContent = "That UTC time lands after the track has already ended.";
        return;
      }

      try {
        audio.currentTime = offsetSeconds;
        await audio.play();
        status.textContent = `Playback started at ${audio.currentTime.toFixed(1)}s.`;
        updateDebug(
          `Now (UTC): ${new Date(nowMs).toISOString()}\n` +
          `Entered start (treated as UTC): ${new Date(startTimestampMs).toISOString()}\n` +
          `Calculated offset: ${offsetSeconds.toFixed(1)}s (${fmt(offsetSeconds)})`
        );
      } catch (err) {
        console.error(err);
        status.textContent = "Playback failed. See browser console.";
      }
    });
  </script>
</body>
</html>
