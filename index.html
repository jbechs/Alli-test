<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Sanity Check</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(90vw, 480px);
      display: grid;
      gap: 16px;
      text-align: center;
    }

    audio {
      width: 100%;
    }

    .status {
      min-height: 2em;
      color: #ccc;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Audio Sanity Check</h1>

    <div class="status" id="status">Ready.</div>

    <audio id="audio" controls preload="metadata" playsinline src="track.mp3"></audio>
  </main>

  <script>
    const audio = document.getElementById("audio");
    const status = document.getElementById("status");

    function setStatus(message) {
      console.log(message);
      status.textContent = message;
    }

    function describeMediaError(el) {
      const code = el.error ? el.error.code : null;
      if (code === 1) return "audio aborted";
      if (code === 2) return "network error";
      if (code === 3) return "decode error";
      if (code === 4) return "source not supported";
      return "audio error";
    }

    setStatus("Ready.");

    console.log("audio.src =", audio.src);
    console.log("canPlayType(audio/mpeg) =", audio.canPlayType("audio/mpeg"));

    audio.addEventListener("loadedmetadata", () => {
      setStatus(`Metadata loaded. Duration: ${audio.duration.toFixed(2)}s`);
    });

    audio.addEventListener("loadeddata", () => {
      setStatus("Audio data loaded.");
    });

    audio.addEventListener("canplay", () => {
      setStatus("Audio can play.");
    });

    audio.addEventListener("play", () => {
      setStatus("Playing.");
    });

    audio.addEventListener("error", () => {
      console.log("audio.error =", audio.error);
      console.log("audio.currentSrc =", audio.currentSrc);
      console.log("audio.networkState =", audio.networkState);
      console.log("audio.readyState =", audio.readyState);
      setStatus(`Audio error: ${describeMediaError(audio)}`);
    });
  </script>
</body>
</html>
