<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confluence</title>

<style>

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
}

.container{
  width:min(90vw,480px);
  display:grid;
  gap:16px;
  text-align:center;
}

h1{
  margin:0;
  font-size:1.6rem;
}

label{
  font-size:.95rem;
}

input,button{
  font-size:1rem;
  padding:12px;
  border-radius:8px;
  border:none;
}

input{
  background:#222;
  color:#fff;
}

button{
  background:#fff;
  color:#111;
  font-weight:bold;
  cursor:pointer;
}

.status{
  min-height:1.4em;
  color:#bbb;
}

.countdown{
  min-height:1.4em;
  font-size:1.2rem;
  font-weight:bold;
}

audio{
  width:100%;
}

.hidden{
  display:none;
}

/* iOS datetime field fix */

input[type="datetime-local"]{
  color:#fff;
  background:#222;
}

input[type="datetime-local"]::-webkit-datetime-edit{
  color:#fff;
}

input[type="datetime-local"]::-webkit-calendar-picker-indicator{
  filter:invert(1);
}

</style>
</head>

<body>

<main class="container">

<h1>Confluence</h1>

<label for="startTime">Start Time (tap to set)</label>
<input id="startTime" type="datetime-local" step="1" placeholder="Tap to choose start time">

<button id="playButton">Play</button>

<div id="countdown" class="countdown"></div>
<div id="status" class="status">Ready.</div>

<audio
id="audio"
src="track.mp3"
preload="metadata"
playsinline
class="hidden">
</audio>

</main>

<script>

const audio = document.getElementById("audio")
const playButton = document.getElementById("playButton")
const startInput = document.getElementById("startTime")
const statusEl = document.getElementById("status")
const countdownEl = document.getElementById("countdown")

let primed = false
let countdownTimer = null
let countdownInterval = null

function setStatus(msg){
  statusEl.textContent = msg
}

function setCountdown(msg){
  countdownEl.textContent = msg
}

function clearTimers(){

  if(countdownInterval){
    clearInterval(countdownInterval)
    countdownInterval = null
  }

  if(countdownTimer){
    clearTimeout(countdownTimer)
    countdownTimer = null
  }

}

function showPlayer(){
  audio.classList.remove("hidden")
  audio.controls = true
}

function hidePlayer(){
  audio.classList.add("hidden")
  audio.controls = false
}

function formatCountdown(ms){

  const s = Math.ceil(ms/1000)
  const m = Math.floor(s/60)
  const sec = s % 60

  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`

}

function formatTrackTime(sec){

  sec = Math.floor(sec)

  const m = Math.floor(sec/60)
  const s = sec%60

  return `${m}:${String(s).padStart(2,"0")}`

}

async function ensureMetadata(){

  if(audio.readyState >= 1) return

  await new Promise((resolve,reject)=>{

    const timeout = setTimeout(()=>reject(new Error("metadata timeout")),10000)

    audio.addEventListener("loadedmetadata",()=>{
      clearTimeout(timeout)
      resolve()
    },{once:true})

    audio.addEventListener("error",()=>{
      clearTimeout(timeout)
      reject(new Error("audio load error"))
    },{once:true})

    audio.load()

  })

}

function waitForSeek(){

  return new Promise(resolve=>{

    if(!audio.seeking){
      resolve()
      return
    }

    audio.addEventListener("seeked",resolve,{once:true})

  })

}

async function primeFuturePlayback(){

  await ensureMetadata()

  hidePlayer()

  audio.pause()
  audio.currentTime = 0
  audio.muted = true

  await audio.play()

  primed = true

  setStatus("Armed for countdown")

}

async function startImmediate(offset){

  await ensureMetadata()

  audio.pause()

  audio.muted = false
  audio.currentTime = Math.max(0,offset)

  await waitForSeek()

  await audio.play()

  showPlayer()

  setStatus(`Playing from ${formatTrackTime(audio.currentTime)}`)

}

async function fireFutureStart(){

  audio.currentTime = 0

  await waitForSeek()

  audio.muted = false

  showPlayer()

  primed = false

  setCountdown("")
  setStatus("Playing")

}

function beginCountdown(startTime){

  clearTimers()

  function update(){

    const remaining = startTime - Date.now()

    if(remaining <= 0){

      clearTimers()

      setCountdown("Starting now")

      fireFutureStart()

      return

    }

    setCountdown(`Starting in ${formatCountdown(remaining)}`)
    setStatus("Waiting")

  }

  update()

  countdownInterval = setInterval(update,250)

  countdownTimer = setTimeout(()=>{

    clearTimers()

    setCountdown("Starting now")

    fireFutureStart()

  },Math.max(0,startTime - Date.now()))

}

playButton.addEventListener("click", async ()=>{

  clearTimers()

  if(!startInput.value){
    setStatus("Enter a start time")
    return
  }

  const startTime = new Date(startInput.value).getTime()

  const offset = (Date.now() - startTime)/1000

  try{

    if(offset < 0){

      await primeFuturePlayback()

      beginCountdown(startTime)

    }else{

      await startImmediate(offset)

    }

  }catch(err){

    console.error(err)
    setStatus("Playback failed")

  }

})

audio.addEventListener("ended",()=>{
  setStatus("Playback ended")
})

</script>

</body>
</html>
