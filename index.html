<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UTC Synced Audio Player</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
}

.container{
  width:min(90vw,480px);
  display:grid;
  gap:16px;
  text-align:center;
}

input,button{
  font-size:1rem;
  padding:12px;
  border-radius:8px;
  border:none;
}

input{
  background:#222;
  color:#fff;
}

button{
  background:#fff;
  color:#111;
  font-weight:bold;
  cursor:pointer;
}

audio{
  width:100%;
}

.status{
  min-height:2em;
  color:#ccc;
}
</style>
</head>

<body>

<main class="container">

<h1>UTC Synced Audio Player</h1>

<label>Start Time (UTC)</label>
<input id="startTime" type="datetime-local" step="1">

<button id="playButton">Play</button>

<div class="status" id="status">Ready.</div>

<audio id="audio" controls preload="metadata" src="track.mp3"></audio>

</main>

<script>

const audio = document.getElementById("audio")
const playButton = document.getElementById("playButton")
const startInput = document.getElementById("startTime")
const status = document.getElementById("status")

function setStatus(msg){
  console.log(msg)
  status.textContent = msg
}

playButton.addEventListener("click", async ()=>{

  if(!startInput.value){
    setStatus("Enter a UTC start time.")
    return
  }

  const startTime = new Date(startInput.value + "Z").getTime()

  const now = Date.now()

  const offset = (now - startTime) / 1000

  if(offset < 0){

    const wait = Math.abs(offset)

    setStatus(`Starting in ${Math.ceil(wait)} seconds...`)

    setTimeout(()=>startPlayback(0), wait*1000)

  } else {

    startPlayback(offset)

  }

})

async function startPlayback(offset){

  try{

    if(isFinite(audio.duration) && offset > audio.duration){

      setStatus("Track already finished.")
      return

    }

    audio.currentTime = Math.max(0,offset)

    await audio.play()

    setStatus(`Playing from ${formatTime(audio.currentTime)}`)

  }catch(err){

    setStatus("Playback failed.")
    console.error(err)

  }

}

function formatTime(sec){

  sec=Math.floor(sec)

  const m=Math.floor(sec/60)

  const s=sec%60

  return `${m}:${String(s).padStart(2,"0")}`

}

</script>

</body>
</html>
