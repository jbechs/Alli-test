<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alli Test - Simple Synced Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(90vw, 420px);
      text-align: center;
      display: grid;
      gap: 14px;
    }

    input,
    button {
      font-size: 1rem;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: #fff;
    }

    button {
      background: #fff;
      color: #111;
      cursor: pointer;
      font-weight: bold;
    }

    .status {
      min-height: 2.5em;
      color: #ccc;
      white-space: pre-line;
    }

    audio {
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>UTC Synced Audio Player</h1>

    <label for="startTime">Start Time (UTC)</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="playButton">Play</button>
    <button id="stopButton">Stop</button>

    <div id="status" class="status">Ready.</div>

    <audio id="audio" controls preload="auto" playsinline>
      <source src="audio/track.mp3" type="audio/mpeg" />
      Your browser does not support audio playback.
    </audio>
  </main>

  <script>
    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const stopButton = document.getElementById("stopButton");
    const startTimeInput = document.getElementById("startTime");
    const statusEl = document.getElementById("status");

    let countdownTimer = null;
    let startTimestampMs = null;

    console.log("SIMPLE PLAYER LOADED");

    playButton.addEventListener("click", async () => {
      clearExistingTimers();

      const inputValue = startTimeInput.value;
      if (!inputValue) {
        setStatus("Please enter a UTC start time.");
        return;
      }

      startTimestampMs = parseUtcInput(inputValue);

      if (Number.isNaN(startTimestampMs)) {
        setStatus("Invalid time format.");
        return;
      }

      try {
        // wake up / unlock audio
        await audio.play();
        audio.pause();
      } catch (err) {
        console.log("Initial unlock attempt failed:", err);
      }

      const offsetSeconds = (Date.now() - startTimestampMs) / 1000;

      if (offsetSeconds < 0) {
        waitUntilStart();
      } else {
        beginPlayback(offsetSeconds);
      }
    });

    stopButton.addEventListener("click", () => {
      clearExistingTimers();
      audio.pause();
      setStatus("Stopped.");
    });

    function parseUtcInput(value) {
      return new Date(value + "Z").getTime();
    }

    function waitUntilStart() {
      const tick = () => {
        const msRemaining = startTimestampMs - Date.now();

        if (msRemaining <= 0) {
          beginPlayback(0);
          return;
        }

        const totalSeconds = Math.ceil(msRemaining / 1000);
        setStatus(`Starting in ${totalSeconds} second${totalSeconds === 1 ? "" : "s"}...`);
        countdownTimer = setTimeout(tick, 250);
      };

      tick();
    }

    async function beginPlayback(initialOffsetSeconds) {
      try {
        const offset = Math.max(0, initialOffsetSeconds);

        setStatus("Preparing playback...");

        await ensureMetadata(audio);

        if (!Number.isNaN(audio.duration) && offset >= audio.duration) {
          setStatus("The track has already finished.");
          return;
        }

        audio.pause();

        if (audio.readyState < 2) {
          setStatus("Waiting for enough audio data...");
          await ensureCanPlay(audio);
        }

        audio.currentTime = offset;
        await waitForSeekIfNeeded(audio, 3000);

        await audio.play();
        setStatus(`Playing from ${formatTime(audio.currentTime)}.`);
      } catch (err) {
        console.error("Playback failed:", err);
        setStatus(`Playback failed: ${err.message}`);
      }
    }

    function ensureMetadata(el) {
      return new Promise((resolve, reject) => {
        if (el.readyState >= 1) {
          resolve();
          return;
        }

        const onLoaded = () => {
          cleanup();
          resolve();
        };

        const onError = () => {
          cleanup();
          reject(new Error(describeMediaError(el)));
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("metadata timeout"));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);
          el.removeEventListener("loadedmetadata", onLoaded);
          el.removeEventListener("error", onError);
        }

        el.addEventListener("loadedmetadata", onLoaded, { once: true });
        el.addEventListener("error", onError, { once: true });
        el.load();
      });
    }

    function ensureCanPlay(el) {
      return new Promise((resolve, reject) => {
        if (el.readyState >= 2) {
          resolve();
          return;
        }

        const onReady = () => {
          cleanup();
          resolve();
        };

        const onError = () => {
          cleanup();
          reject(new Error(describeMediaError(el)));
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("buffering timeout"));
        }, 20000);

        function cleanup() {
          clearTimeout(timer);
          el.removeEventListener("loadeddata", onReady);
          el.removeEventListener("canplay", onReady);
          el.removeEventListener("error", onError);
        }

        el.addEventListener("loadeddata", onReady, { once: true });
        el.addEventListener("canplay", onReady, { once: true });
        el.addEventListener("error", onError, { once: true });
      });
    }

    function waitForSeekIfNeeded(el, timeoutMs = 3000) {
      return new Promise((resolve) => {
        if (!el.seeking) {
          resolve();
          return;
        }

        const onSeeked = () => {
          cleanup();
          resolve();
        };

        const timer = setTimeout(() => {
          cleanup();
          resolve();
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timer);
          el.removeEventListener("seeked", onSeeked);
        }

        el.addEventListener("seeked", onSeeked, { once: true });
      });
    }

    function describeMediaError(el) {
      const code = el.error ? el.error.code : null;
      if (code === 1) return "audio aborted";
      if (code === 2) return "network error";
      if (code === 3) return "decode error";
      if (code === 4) return "source not supported";
      return "audio error";
    }

    function clearExistingTimers() {
      if (countdownTimer) {
        clearTimeout(countdownTimer);
        countdownTimer = null;
      }
    }

    function setStatus(message) {
      console.log("STATUS:", message);
      statusEl.textContent = message;
    }

    function formatTime(seconds) {
      const s = Math.max(0, Math.floor(seconds));
      const hrs = Math.floor(s / 3600);
      const mins = Math.floor((s % 3600) / 60);
      const secs = s % 60;

      if (hrs > 0) {
        return `${hrs}:${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    audio.addEventListener("loadedmetadata", () => {
      console.log("EVENT: loadedmetadata", audio.duration);
    });

    audio.addEventListener("loadeddata", () => {
      console.log("EVENT: loadeddata");
    });

    audio.addEventListener("canplay", () => {
      console.log("EVENT: canplay");
    });

    audio.addEventListener("waiting", () => {
      setStatus("Playback is waiting for data...");
    });

    audio.addEventListener("stalled", () => {
      setStatus("Playback stalled.");
    });

    audio.addEventListener("ended", () => {
      setStatus("Playback ended.");
    });

    audio.addEventListener("error", () => {
      console.log("AUDIO ERROR OBJECT:", audio.error);
      console.log("AUDIO currentSrc:", audio.currentSrc);
      console.log("AUDIO readyState:", audio.readyState);
      console.log("AUDIO networkState:", audio.networkState);
      setStatus(`Audio error: ${describeMediaError(audio)}`);
    });
  </script>
</body>
</html>
