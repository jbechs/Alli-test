<script>
  const audio = document.getElementById("audio");
  const playButton = document.getElementById("playButton");
  const startNowButton = document.getElementById("startNowButton");
  const fill30Button = document.getElementById("fill30Button");
  const utcTimeInput = document.getElementById("utcTime");
  const utcNowEl = document.getElementById("utcNow");
  const status = document.getElementById("status");
  const debug = document.getElementById("debug");

  let scheduledTimer = null;
  let countdownTimer = null;

  function fmt(seconds) {
    if (!isFinite(seconds)) return "unknown";
    const s = Math.floor(Math.max(0, seconds));
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${String(sec).padStart(2, "0")}`;
  }

  function pad(n) {
    return String(n).padStart(2, "0");
  }

  function getUtcHMS(date = new Date()) {
    return `${pad(date.getUTCHours())}:${pad(date.getUTCMinutes())}:${pad(date.getUTCSeconds())}`;
  }

  function updateUtcClock() {
    utcNowEl.textContent = getUtcHMS();
  }

  function parseUtcTimeToday(hms) {
    const match = hms.trim().match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
    if (!match) return NaN;

    const hours = Number(match[1]);
    const minutes = Number(match[2]);
    const seconds = Number(match[3] || "0");

    if (
      hours < 0 || hours > 23 ||
      minutes < 0 || minutes > 59 ||
      seconds < 0 || seconds > 59
    ) {
      return NaN;
    }

    const now = new Date();
    return Date.UTC(
      now.getUTCFullYear(),
      now.getUTCMonth(),
      now.getUTCDate(),
      hours,
      minutes,
      seconds
    );
  }

  function clearScheduledStart() {
    if (scheduledTimer) {
      clearTimeout(scheduledTimer);
      scheduledTimer = null;
    }
    if (countdownTimer) {
      clearInterval(countdownTimer);
      countdownTimer = null;
    }
  }

  function updateDebug(extra = "") {
    debug.textContent =
      `Current audio time: ${audio.currentTime.toFixed(1)}s (${fmt(audio.currentTime)})\n` +
      `Track duration: ${isFinite(audio.duration) ? audio.duration.toFixed(1) : "unknown"}s (${fmt(audio.duration)})\n` +
      extra;
  }

  async function playAtOffset(offsetSeconds) {
    if (!isFinite(audio.duration)) {
      status.textContent = "Audio duration not ready yet.";
      return;
    }

    if (offsetSeconds >= audio.duration) {
      status.textContent = "That start time lands after the track has already ended.";
      return;
    }

    const safeOffset = Math.max(0, offsetSeconds);
    audio.currentTime = safeOffset;
    await audio.play();
    status.textContent = `Playback started at ${audio.currentTime.toFixed(1)}s.`;
  }

  async function handleScheduledPlayback(startTimestampMs) {
    const nowMs = Date.now();
    const offsetSeconds = (nowMs - startTimestampMs) / 1000;

    updateDebug(
      `Now (UTC): ${new Date(nowMs).toISOString()}\n` +
      `Entered start today (UTC): ${new Date(startTimestampMs).toISOString()}\n` +
      `Calculated offset: ${offsetSeconds.toFixed(1)}s (${fmt(offsetSeconds)})`
    );

    if (offsetSeconds < 0) {
      const msUntilStart = startTimestampMs - nowMs;
      status.textContent = `Scheduled. Starts in ${(msUntilStart / 1000).toFixed(1)}s.`;

      countdownTimer = setInterval(() => {
        const remainingMs = startTimestampMs - Date.now();
        if (remainingMs <= 0) {
          clearScheduledStart();
          return;
        }
        status.textContent = `Scheduled. Starts in ${(remainingMs / 1000).toFixed(1)}s.`;
      }, 100);

      scheduledTimer = setTimeout(async () => {
        clearScheduledStart();
        try {
          await playAtOffset(0);
          updateDebug(
            `Now (UTC): ${new Date(Date.now()).toISOString()}\n` +
            `Entered start today (UTC): ${new Date(startTimestampMs).toISOString()}\n` +
            `Calculated offset: 0.0s (${fmt(0)})`
          );
        } catch (err) {
          console.error(err);
          status.textContent = "Scheduled playback failed. See browser console.";
        }
      }, msUntilStart);

      return;
    }

    await playAtOffset(offsetSeconds);
  }

  audio.addEventListener("loadedmetadata", () => {
    status.textContent = `Audio loaded. Duration: ${fmt(audio.duration)}.`;
    updateDebug();
  });

  audio.addEventListener("canplay", () => {
    status.textContent = "Player can play.";
    updateDebug();
  });

  audio.addEventListener("error", () => {
    console.error("Audio element error:", audio.error);
    status.textContent = "Audio error. File path or file format problem.";
    updateDebug();
  });

  audio.addEventListener("ended", () => {
    status.textContent = "Playback ended.";
    updateDebug();
  });

  startNowButton.addEventListener("click", async () => {
    clearScheduledStart();
    try {
      audio.currentTime = 0;
      await audio.play();
      status.textContent = "Playing from start.";
      updateDebug();
    } catch (err) {
      console.error(err);
      status.textContent = "Play from start failed.";
    }
  });

  fill30Button.addEventListener("click", () => {
    const d = new Date(Date.now() - 30000);
    utcTimeInput.value = getUtcHMS(d);
    status.textContent = "Set start time to 30 seconds ago in UTC.";
  });

  playButton.addEventListener("click", async () => {
    clearScheduledStart();

    const inputValue = utcTimeInput.value;

    if (!inputValue) {
      status.textContent = "Please enter a UTC time.";
      updateDebug();
      return;
    }

    const startTimestampMs = parseUtcTimeToday(inputValue);

    if (Number.isNaN(startTimestampMs)) {
      status.textContent = "Invalid UTC time. Use HH:MM:SS.";
      updateDebug();
      return;
    }

    try {
      await handleScheduledPlayback(startTimestampMs);
    } catch (err) {
      console.error(err);
      status.textContent = "Playback failed. See browser console.";
    }
  });

  updateUtcClock();
  setInterval(updateUtcClock, 500);
</script>
